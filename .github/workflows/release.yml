name: Release to NuGet

on:
  push:
    tags: ['v*']

permissions:
  id-token: write   # NuGet trusted publishing via OIDC
  contents: write   # GitHub Release creation
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: nuget  # must match NuGet.org trusted publisher config

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: |
          dotnet build src/Fyper/Fyper.fsproj -c Release
          dotnet build src/Fyper.Parser/Fyper.Parser.fsproj -c Release
          dotnet build src/Fyper.Neo4j/Fyper.Neo4j.fsproj -c Release
          dotnet build src/Fyper.Age/Fyper.Age.fsproj -c Release

      - name: Test
        run: dotnet test tests/Fyper.Tests/Fyper.Tests.fsproj -c Release

      - name: Pack
        run: |
          dotnet pack src/Fyper/Fyper.fsproj -c Release --no-build -o nupkg
          dotnet pack src/Fyper.Parser/Fyper.Parser.fsproj -c Release --no-build -o nupkg
          dotnet pack src/Fyper.Neo4j/Fyper.Neo4j.fsproj -c Release --no-build -o nupkg
          dotnet pack src/Fyper.Age/Fyper.Age.fsproj -c Release --no-build -o nupkg

      - name: Publish to NuGet (trusted publishing)
        run: |
          for pkg in nupkg/*.nupkg; do
            dotnet nuget push "$pkg" \
              --source https://api.nuget.org/v3/index.json \
              --api-key az \
              --skip-duplicate
          done

      - name: Publish symbols
        run: |
          for pkg in nupkg/*.snupkg; do
            dotnet nuget push "$pkg" \
              --source https://api.nuget.org/v3/index.json \
              --api-key az \
              --skip-duplicate
          done
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: nupkg/*
          generate_release_notes: true
